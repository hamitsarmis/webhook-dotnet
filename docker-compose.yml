services:
  webhookfx:
    build:
      context: ./WebhookFx
      dockerfile: Dockerfile
    network_mode: host
    volumes:
      - ./logs:/app/logs
    env_file:
      - .env
    depends_on:
      - rabbitmq

  outbox-processor:
    build:
      context: ./OutboxProcessor
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      rabbitmq:
        condition: service_healthy

  rabbitmq:
    image: rabbitmq:4-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5
